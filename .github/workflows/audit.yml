name: Weekly Audit

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  frontend-audit:
    name: Frontend npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install
        run: |
          cd frontend
          npm ci

      - name: Run npm audit (non-failing)
        run: |
          cd frontend
          npm audit --json > ../frontend-audit.json || true

      - name: Build frontend audit summaries
        run: |
          node <<'NODE'
          const fs = require('fs');

          const severities = ['critical', 'high', 'moderate', 'low'];
          let counts = { critical: 0, high: 0, moderate: 0, low: 0 };
          let parseError = null;

          try {
            const raw = fs.readFileSync('frontend-audit.json', 'utf8');
            const audit = JSON.parse(raw);

            if (audit?.metadata?.vulnerabilities) {
              for (const sev of severities) {
                counts[sev] = Number(audit.metadata.vulnerabilities[sev] || 0);
              }
            } else if (audit?.advisories) {
              for (const advisory of Object.values(audit.advisories)) {
                const sev = advisory?.severity;
                if (severities.includes(sev)) counts[sev] += 1;
              }
            }
          } catch (error) {
            parseError = error.message;
          }

          const total =
            counts.critical + counts.high + counts.moderate + counts.low;
          const summary = {
            critical: counts.critical,
            high: counts.high,
            moderate: counts.moderate,
            low: counts.low,
            total,
            parse_error: parseError,
          };

          fs.writeFileSync(
            'frontend-audit-summary.json',
            `${JSON.stringify(summary, null, 2)}\n`
          );

          const lines = [
            '### Frontend Audit',
            '',
            `- Critical: **${counts.critical}**`,
            `- High: **${counts.high}**`,
            `- Moderate: **${counts.moderate}**`,
            `- Low: **${counts.low}**`,
            `- Total: **${total}**`,
          ];
          if (parseError) {
            lines.push(`- Parse error: \`${parseError}\``);
          }
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`);
          NODE

      - name: Upload frontend audit reports
        uses: actions/upload-artifact@v4
        with:
          name: frontend-npm-audit
          path: |
            frontend-audit.json
            frontend-audit-summary.json

  backend-deps:
    name: Backend dependency update report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Generate dependency update report
        working-directory: backend
        run: |
          chmod +x ./mvnw
          ./mvnw -B -DskipTests -DallowSnapshots=false versions:display-dependency-updates | tee ../backend-updates.txt || true

      - name: Generate plugin update report
        working-directory: backend
        run: |
          chmod +x ./mvnw
          ./mvnw -B -DskipTests -DallowSnapshots=false versions:display-plugin-updates | tee ../backend-plugins-updates.txt || true

      - name: Generate property update report (optional)
        working-directory: backend
        run: |
          chmod +x ./mvnw
          ./mvnw -B -DskipTests -DallowSnapshots=false versions:display-property-updates | tee ../backend-properties-updates.txt || true

      - name: Build backend update summary
        run: |
          # count only stable updates (ignore -M*, -RC*, -SNAPSHOT)
          count_updates() {
            local file="$1"
            # Count only real dependency lines: "group:artifact .... x -> y"
            # Exclude pre-releases: -M*, -RC*, -SNAPSHOT, -rc*
            grep -E -- '^\s*\[INFO\]\s+[a-zA-Z0-9_.-]+:[a-zA-Z0-9_.-]+.*->.*$' "$file" \
              | grep -Ev -- '->.*(-M[0-9]+|-RC[0-9]+|-SNAPSHOT|-rc[0-9]*)(\s|$)' \
              | wc -l | tr -d ' '
          }

          dependency_updates=$(count_updates backend-updates.txt)
          plugin_updates=$(count_updates backend-plugins-updates.txt)
          property_updates=$(count_updates backend-properties-updates.txt)
          total_updates=$((dependency_updates + plugin_updates + property_updates))

          cat > backend-updates-summary.json <<EOF
          {
            "dependencies_with_updates": ${dependency_updates},
            "plugins_with_updates": ${plugin_updates},
            "properties_with_updates": ${property_updates},
            "total_with_updates": ${total_updates}
          }
          EOF

          {
            echo "### Backend Dependency Updates"
            echo ""
            echo "- Dependencies with updates: **${dependency_updates}**"
            echo "- Plugins with updates: **${plugin_updates}**"
            echo "- Properties with updates: **${property_updates}**"
            echo "- Total update entries: **${total_updates}**"
            echo ""
            echo "Top 10 (stable):"
            echo '```'
            grep -E -- '^\s*\[INFO\]\s+[a-zA-Z0-9_.-]+:[a-zA-Z0-9_.-]+.*->.*$' backend-updates.txt \
              | grep -Ev -- '->.*(-M[0-9]+|-RC[0-9]+|-SNAPSHOT|-rc[0-9]*)(\s|$)' \
              | head -n 10
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload backend dependency reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-deps
          path: |
            backend-updates.txt
            backend-plugins-updates.txt
            backend-properties-updates.txt
            backend-updates-summary.json

  notify-ha:
    name: Send audit to Home Assistant
    runs-on: ubuntu-latest
    needs: [frontend-audit, backend-deps]
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-npm-audit
          path: artifacts/frontend

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-deps
          path: artifacts/backend

      - name: Build HA payload
        run: |
          node <<'NODE'
          const fs = require('fs');

          const frontend = JSON.parse(fs.readFileSync('artifacts/frontend/frontend-audit-summary.json', 'utf8'));
          const backend = JSON.parse(fs.readFileSync('artifacts/backend/backend-updates-summary.json', 'utf8'));

          const payload = {
            project: 'SideQuestLab',
            timestamp: new Date().toISOString(),
            frontend: {
              critical: frontend.critical,
              high: frontend.high,
              moderate: frontend.moderate,
              low: frontend.low,
              total: frontend.total
            },
            backend: {
              dependencies_with_updates: backend.dependencies_with_updates,
              plugins_with_updates: backend.plugins_with_updates,
              properties_with_updates: backend.properties_with_updates,
              total_with_updates: backend.total_with_updates
            }
          };

          fs.writeFileSync('ha-payload.json', JSON.stringify(payload));
          NODE

      - name: POST to Home Assistant webhook
        env:
          HA_WEBHOOK_URL: ${{ secrets.HA_WEBHOOK_URL }}
        run: |
          curl -sS -X POST "$HA_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data-binary @ha-payload.json
