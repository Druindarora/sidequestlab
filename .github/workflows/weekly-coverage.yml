name: Weekly Coverage

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  coverage-report:
    name: Coverage report baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run coverage report script
        run: |
          set -o pipefail
          chmod +x ./scripts/coverage-report.sh
          ./scripts/coverage-report.sh | tee coverage-summary.txt

      - name: Publish coverage summary
        run: |
          if [[ -f coverage-summary.md ]]; then
            cat coverage-summary.md >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "Coverage summary markdown missing." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          if-no-files-found: error
          path: |
            coverage-summary.txt
            coverage-summary.md
            coverage-summary.json
            frontend/coverage
            backend/target/site/jacoco
